<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F5EDD8;
  --card: rgba(255,255,255,0.55);
  --ink: #2C1810;
  --muted: #7A5535;
  --border: #C9A87C;
  --divider: #D4B896;
  --accent: #8B3A1A;
  --placeholder: #B8956A;
  --metro-bg: #2C1810;
  --metro-text: #F5EDD8;
  --surface: #EDE0C4;
  --input-bg: rgba(255,255,255,0.4);
}
body.dark {
  --bg: #1C1208;
  --card: rgba(255,255,255,0.06);
  --ink: #F0E6D0;
  --muted: #C9A87C;
  --border: #5C3E22;
  --divider: #3E2A14;
  --accent: #E08060;
  --placeholder: #8B6040;
  --metro-bg: #F0E6D0;
  --metro-text: #1C1208;
  --surface: #2A1A0C;
  --input-bg: rgba(255,255,255,0.08);
}
body { background: var(--bg); color: var(--ink); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; min-height: 100vh; padding: 24px 16px 60px; transition: background 0.2s, color 0.2s; }
.wrap { max-width: 700px; margin: 0 auto; }
.top-bar { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
.title { font-family: Georgia, serif; font-size: 22px; font-weight: 400; color: var(--ink); }
.sub { font-size: 12px; color: var(--muted); margin-top: 3px; font-style: italic; }
.top-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
.ghost-btn { background: var(--surface); border: 0.5px solid var(--border); color: var(--muted); font-size: 12px; padding: 7px 11px; border-radius: 6px; cursor: pointer; white-space: nowrap; }
.ghost-btn:hover { border-color: var(--accent); color: var(--ink); }
#deleteBtn { display: none; }
#deleteBtn.visible { display: inline-block; }
#deleteBtn:hover { border-color: #c0392b; color: #c0392b; }
.save-btn { background: var(--ink); color: var(--bg); border: none; font-size: 13px; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-family: Georgia, serif; white-space: nowrap; }
.save-btn:hover { opacity: 0.85; }
.meta-grid { display: grid; grid-template-columns: 1.4fr 1fr 1fr 80px; gap: 10px; margin-bottom: 14px; }
.meta-card { background: var(--card); border: 0.5px solid var(--border); border-radius: 10px; padding: 10px 14px; }
.meta-label { font-size: 10px; color: var(--muted); letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 5px; }
.meta-input { background: transparent; border: none; font-size: 15px; color: var(--ink); outline: none; width: 100%; font-family: inherit; }
.meta-duration { font-size: 15px; color: var(--accent); font-family: "Courier New", monospace; min-height: 22px; }
.session-energy-row { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
.stats-bar { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
.stat-pill { background: var(--card); border: 0.5px solid var(--border); border-radius: 10px; padding: 8px 14px; display: flex; flex-direction: column; align-items: flex-start; min-width: 78px; flex: 1; }
.stat-value { font-family: Georgia, serif; font-size: 17px; color: var(--accent); }
.stat-label { font-size: 10px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-top: 2px; }
.today-strip { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
.strip-chip { background: var(--surface); border: 0.5px solid var(--border); border-radius: 20px; padding: 5px 11px; font-size: 11px; color: var(--muted); white-space: nowrap; cursor: pointer; }
.strip-chip:hover { border-color: var(--accent); }
.strip-chip.chip-active { border-color: var(--accent); border-width: 1.5px; color: var(--ink); }
.strip-chip .chip-time { color: var(--accent); font-family: "Courier New", monospace; margin-right: 6px; }
.strip-empty { font-size: 11px; color: var(--muted); font-style: italic; padding: 4px 2px; }
.history-panel { display: none; margin-top: 10px; margin-bottom: 18px; padding: 12px 14px; background: var(--card); border: 0.5px solid var(--border); border-radius: 10px; }
.history-panel.open { display: block; }
.history-controls { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
.history-controls input[type="date"] { background: var(--input-bg); border: 0.5px solid var(--border); border-radius: 8px; padding: 6px 10px; font-size: 13px; color: var(--ink); font-family: inherit; }
.history-summary { font-size: 12px; color: var(--accent); font-family: Georgia, serif; margin-bottom: 8px; }
.auth-gate { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
.auth-card { background: var(--card); border: 0.5px solid var(--border); border-radius: 12px; padding: 28px 26px; max-width: 320px; width: 100%; text-align: center; }
.auth-input { width: 100%; background: var(--input-bg); border: 0.5px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 15px; color: var(--ink); outline: none; font-family: inherit; }
.auth-input:focus { border-color: var(--accent); }
.auth-error { font-size: 12px; color: #c0392b; margin-top: 10px; min-height: 16px; }
.energy-card { background: var(--card); border: 0.5px solid var(--border); border-radius: 10px; padding: 10px 14px; }
.energy-pips { display: flex; gap: 6px; margin-top: 6px; }
.epip { padding: 5px 12px; border-radius: 20px; border: 1.5px solid var(--border); font-size: 12px; color: var(--muted); cursor: pointer; white-space: nowrap; user-select: none; }
.epip.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
.section-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 12px; }
.section-title { font-family: Georgia, serif; font-size: 16px; color: var(--ink); font-weight: 400; }
.section-sub { font-size: 11px; color: var(--muted); font-style: italic; }
.tech-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
.t-card { background: var(--card); border: 0.5px solid var(--border); border-radius: 10px; padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; }
.t-card-label { font-size: 10px; color: var(--muted); letter-spacing: 0.07em; text-transform: uppercase; }
.t-input { background: transparent; border: none; border-bottom: 0.5px solid var(--divider); font-size: 13px; color: var(--ink); width: 100%; outline: none; padding-bottom: 4px; font-family: inherit; }
.t-input::placeholder { color: var(--placeholder); }
.metro-row { display: flex; align-items: center; gap: 5px; }
.metro-badge { background: var(--metro-bg); color: var(--metro-text); font-size: 8px; letter-spacing: 0.08em; padding: 2px 5px; border-radius: 3px; flex-shrink: 0; }
.metro-row input { width: 38px; font-size: 12px; font-family: "Courier New", monospace; text-align: center; border: none; background: var(--input-bg); color: var(--ink); border-radius: 4px; padding: 3px 0; outline: none; -moz-appearance: textfield; }
.metro-row input::-webkit-outer-spin-button, .metro-row input::-webkit-inner-spin-button { -webkit-appearance: none; }
.metro-sep { color: var(--accent); font-size: 12px; }
.t-notes { background: transparent; border: none; font-size: 12px; color: var(--ink); width: 100%; outline: none; resize: none; font-family: Georgia, serif; font-style: italic; }
.t-notes::placeholder { color: var(--placeholder); font-style: italic; }
.key-grid { display: flex; flex-wrap: wrap; gap: 6px; }
.key-chip { width: 32px; height: 28px; border-radius: 6px; border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--muted); cursor: pointer; user-select: none; font-family: "Courier New", monospace; }
.key-chip.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
.type-pips { display: flex; gap: 6px; flex-wrap: wrap; }
.type-pip { padding: 5px 12px; border-radius: 20px; border: 1.5px solid var(--border); font-size: 12px; color: var(--muted); cursor: pointer; white-space: nowrap; user-select: none; }
.type-pip.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
.piece-picker { display: flex; flex-direction: column; gap: 8px; }
.piece-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.piece-chip { padding: 5px 11px; border-radius: 16px; border: 1.5px solid var(--border); font-size: 12px; color: var(--muted); cursor: pointer; white-space: nowrap; user-select: none; background: var(--surface); }
.piece-chip.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
.divider-rep { height: 1px; background: var(--divider); margin: 20px 0; position: relative; }
.divider-rep::after { content: '— repertoire —'; position: absolute; left: 50%; transform: translateX(-50%); top: -8px; background: var(--bg); padding: 0 10px; font-size: 10px; color: var(--muted); letter-spacing: 0.1em; font-family: Georgia, serif; font-style: italic; white-space: nowrap; }
.rep-block { margin-bottom: 12px; }
.rep-label { font-size: 10px; color: var(--muted); letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 6px; }
.rep-card { background: var(--card); border: 0.5px solid var(--border); border-radius: 10px; padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; }
.rep-input { background: transparent; border: none; border-bottom: 0.5px solid var(--divider); font-size: 13px; color: var(--ink); width: 100%; outline: none; padding-bottom: 4px; font-family: inherit; }
.rep-input::placeholder { color: var(--placeholder); }
.rep-notes { background: transparent; border: none; font-size: 13px; color: var(--ink); width: 100%; outline: none; resize: none; font-family: Georgia, serif; font-style: italic; }
.rep-notes::placeholder { color: var(--placeholder); font-style: italic; }
.win-card { background: var(--card); border: 1.5px solid var(--accent); border-radius: 10px; padding: 12px 14px; margin-top: 18px; }
.win-label { font-size: 10px; color: var(--accent); letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 6px; }
.win-input { background: transparent; border: none; font-size: 14px; color: var(--ink); width: 100%; outline: none; font-family: Georgia, serif; font-style: italic; }
.win-input::placeholder { color: var(--placeholder); font-style: italic; }
.bottom-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
.save-status { font-size: 12px; color: var(--muted); font-style: italic; min-height: 18px; }
.save-status.saved { color: var(--accent); }
.save-status.error { color: #c0392b; }
.wrap { transition: opacity 0.2s; }
.wrap.dimmed { opacity: 0.4; }
.new-entry-btn { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: var(--accent); color: var(--bg); border: none; font-size: 15px; font-family: Georgia, serif; padding: 14px 28px; border-radius: 30px; cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.25); z-index: 10; display: none; white-space: nowrap; }
.new-entry-btn.visible { display: block; }
.new-entry-btn:hover { opacity: 0.9; }
@media (max-width: 500px) {
  .meta-grid { grid-template-columns: 1fr 1fr; }
  .tech-cards { grid-template-columns: 1fr; }
  .top-actions { gap: 6px; }
}
</style>
</head>
<body>
<div class="auth-gate" id="authGate">
  <div class="auth-card">
    <div class="title">Practice log</div>
    <div class="sub" style="margin-bottom: 18px;">Enter password to continue</div>
    <input type="password" class="auth-input" id="authInput" placeholder="Password" autocomplete="current-password">
    <button class="save-btn" id="authSubmit" style="width: 100%; margin-top: 10px;">Unlock</button>
    <div class="auth-error" id="authError"></div>
  </div>
</div>

<div class="wrap" id="appWrap" style="display: none;">
  <div class="top-bar">
    <div>
      <div class="title">Practice log</div>
      <div class="sub">Jon Ward &middot; piano</div>
    </div>
    <div class="top-actions">
      <a class="ghost-btn" href="data.html" style="text-decoration: none; display: inline-flex; align-items: center;">📋 All entries</a>
      <button class="ghost-btn" id="modeBtn">🌙 Dark</button>
      <button class="ghost-btn" id="exportBtn">Export PDF</button>
      <button class="ghost-btn" id="deleteBtn">Delete entry</button>
      <button class="save-btn" id="saveBtn">Save session</button>
    </div>
  </div>

  <div class="stats-bar" id="statsBar">
    <div class="stat-pill">
      <div class="stat-value" id="statToday">—</div>
      <div class="stat-label">Today</div>
    </div>
    <div class="stat-pill">
      <div class="stat-value" id="statWeek">—</div>
      <div class="stat-label">This week</div>
    </div>
    <div class="stat-pill">
      <div class="stat-value" id="statAllTime">—</div>
      <div class="stat-label">All-time</div>
    </div>
  </div>
  <div class="today-strip" id="todayStrip"></div>

  <button class="ghost-btn" id="historyToggle">📖 View other days</button>
  <div class="history-panel" id="historyPanel">
    <div class="history-controls">
      <input type="date" class="meta-input" id="historyDate">
      <button class="ghost-btn" id="historyBack">Back to today</button>
    </div>
    <div class="history-summary" id="historySummary"></div>
    <div class="today-strip" id="historyStrip"></div>
  </div>

  <div class="meta-grid">
    <div class="meta-card">
      <div class="meta-label">Date</div>
      <input class="meta-input" type="date" id="sessionDate">
    </div>
    <div class="meta-card">
      <div class="meta-label">Start time</div>
      <input class="meta-input" type="time" id="startTime">
    </div>
    <div class="meta-card">
      <div class="meta-label">End time</div>
      <input class="meta-input" type="time" id="endTime">
    </div>
    <div class="meta-card">
      <div class="meta-label">Duration</div>
      <div class="meta-duration" id="duration">—</div>
    </div>
  </div>

  <div class="session-energy-row">
    <div class="energy-card">
      <div class="meta-label">Energy</div>
      <div class="energy-pips" id="energyPips">
        <div class="epip" data-val="low">Low</div>
        <div class="epip active" data-val="good">Good</div>
        <div class="epip" data-val="fire">🔥</div>
      </div>
    </div>
  </div>

  <div class="section-header">
    <div class="section-title">Technique</div>
    <div class="section-sub">20 minutes</div>
  </div>
  <div class="tech-cards" id="techCards"></div>

  <div class="divider-rep"></div>

  <div class="section-header">
    <div class="section-title">Repertoire</div>
    <div class="section-sub">25 minutes</div>
  </div>
  <div id="repBlocks"></div>

  <div class="win-card">
    <div class="win-label">Win of the session</div>
    <input class="win-input" type="text" id="winField" placeholder="One thing that went well today...">
  </div>

  <div class="bottom-bar">
    <div class="save-status" id="saveStatus">Not saved yet</div>
    <button class="save-btn" id="exportBtn2">Export PDF</button>
  </div>
</div>

<button class="new-entry-btn" id="newEntryBtn">＋ New entry</button>

<script>
const API = '/api/sessions';
const API_STATS = '/api/stats';
const API_DAY = '/api/day';
const API_PIECES = '/api/technical-pieces';
const techniques = ['Scales','Arpeggios','Chord progressions','Technical piece'];
const KEYS = ['C','G','D','A','E','B','F','Bb','Eb','Ab','Db','Gb'];
const SCALE_ARPEGGIO_TYPES = ['Major','Minor']; // extend here as new types come up in class
const KEY_GRID_TECHNIQUES = ['Scales','Arpeggios'];
const PIECE_PICKER_TECHNIQUES = ['Technical piece'];
const PASSWORD_KEY = 'practice_log_password';

function getStoredPassword() {
  return localStorage.getItem(PASSWORD_KEY) || '';
}

// Every call to our own API goes through this, so the auth header only
// has to be attached in one place.
function apiFetch(url, options = {}) {
  const headers = Object.assign({}, options.headers, { 'X-App-Password': getStoredPassword() });
  return fetch(url, Object.assign({}, options, { headers }));
}
let technicalPieces = []; // [{id, name}], fetched from API
const repItems = [
  { label: 'Traditionally notated', key: 'trad', notesPlaceholder: 'What did you accomplish? Trouble spots? Questions?' },
  { label: 'Lead sheet', key: 'lead', notesPlaceholder: 'What did you accomplish? Trouble spots? Questions?' },
  { label: 'Listening assignments', key: 'listen', notesPlaceholder: 'Observations, things to apply to your playing...' }
];

let currentId = null;
let sessionNum = 1;
let energyVal = 'good';
let isDark = false;

function setCurrentId(id) {
  currentId = id;
  document.getElementById('deleteBtn').classList.toggle('visible', !!id);
}

const techCards = document.getElementById('techCards');
techniques.forEach((t, i) => {
  const card = document.createElement('div');
  card.className = 't-card';

  let bodyHtml;
  if (KEY_GRID_TECHNIQUES.includes(t)) {
    bodyHtml = `
      <div class="key-grid" data-row="${i}">
        ${KEYS.map(k => `<div class="key-chip" data-key="${k}">${k}</div>`).join('')}
      </div>
      <div class="type-pips" data-row="${i}">
        ${SCALE_ARPEGGIO_TYPES.map(ty => `<div class="type-pip" data-type="${ty}">${ty}</div>`).join('')}
      </div>
    `;
  } else if (PIECE_PICKER_TECHNIQUES.includes(t)) {
    bodyHtml = `
      <div class="piece-picker" data-row="${i}">
        <div class="piece-chips" data-row="${i}"></div>
        <input class="t-input" type="text" placeholder="+ Add new piece (press Enter)" data-row="${i}">
      </div>
    `;
  } else {
    bodyHtml = `<input class="t-input" type="text" placeholder="Key / name" data-field="keyname" data-row="${i}">`;
  }

  card.innerHTML = `
    <div class="t-card-label">${t}</div>
    ${bodyHtml}
    <div class="metro-row">
      <span class="metro-badge">METRO</span>
      <input type="number" placeholder="start" data-field="bpmstart" data-row="${i}">
      <span class="metro-sep">→</span>
      <input type="number" placeholder="end" data-field="bpmend" data-row="${i}">
    </div>
    <textarea class="t-notes" rows="2" placeholder="Notes..." data-field="technotes" data-row="${i}"></textarea>
  `;
  techCards.appendChild(card);
});

// One delegated listener handles clicks across all dynamically-built
// key/type/piece chips, regardless of which row they're in.
techCards.addEventListener('click', e => {
  const wrap = document.querySelector('.wrap');
  const unDim = () => { if (wrap.classList.contains('dimmed')) hideNewEntryPrompt(); };

  const keyChip = e.target.closest('.key-chip');
  if (keyChip) {
    keyChip.classList.toggle('active');
    unDim();
    return;
  }

  const typePip = e.target.closest('.type-pip');
  if (typePip) {
    const container = typePip.closest('.type-pips');
    container.querySelectorAll('.type-pip').forEach(p => p.classList.remove('active'));
    typePip.classList.add('active');
    unDim();
    return;
  }

  const pieceChip = e.target.closest('.piece-chip');
  if (pieceChip) {
    const container = pieceChip.closest('.piece-chips');
    container.querySelectorAll('.piece-chip').forEach(p => p.classList.remove('active'));
    pieceChip.classList.add('active');
    unDim();
    return;
  }
});

techCards.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const input = e.target.closest('.piece-picker input');
  if (!input) return;
  e.preventDefault();
  addTechnicalPiece(input);
});

async function loadTechnicalPieces() {
  try {
    const res = await apiFetch(API_PIECES);
    if (!res.ok) return;
    technicalPieces = await res.json();
    renderPieceChips();
  } catch (e) {
    /* silently fail — API may not be bound yet */
  }
}

function renderPieceChips() {
  const idx = techniques.indexOf('Technical piece');
  if (idx === -1) return;
  const container = document.querySelector(`.piece-chips[data-row="${idx}"]`);
  if (!container) return;
  const activeEl = container.querySelector('.piece-chip.active');
  const activeName = activeEl ? activeEl.dataset.name : null;
  container.innerHTML = technicalPieces.map(p =>
    `<div class="piece-chip${p.name === activeName ? ' active' : ''}" data-name="${p.name.replace(/"/g, '&quot;')}">${p.name}</div>`
  ).join('');
}

async function addTechnicalPiece(inputEl) {
  const name = inputEl.value.trim();
  if (!name) return;
  try {
    const res = await apiFetch(API_PIECES, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name }) });
    const piece = await res.json();
    if (!technicalPieces.some(p => p.name === piece.name)) {
      technicalPieces.push(piece);
      technicalPieces.sort((a, b) => a.name.localeCompare(b.name));
    }
    renderPieceChips();
    const idx = techniques.indexOf('Technical piece');
    const container = document.querySelector(`.piece-chips[data-row="${idx}"]`);
    if (container) {
      container.querySelectorAll('.piece-chip').forEach(el => el.classList.toggle('active', el.dataset.name === piece.name));
    }
    inputEl.value = '';
    if (document.querySelector('.wrap').classList.contains('dimmed')) hideNewEntryPrompt();
  } catch (err) {
    setStatus('Could not add piece — check connection', 'error');
  }
}

// called from initApp() after auth succeeds

const repBlocks = document.getElementById('repBlocks');
repItems.forEach(r => {
  const block = document.createElement('div');
  block.className = 'rep-block';
  block.innerHTML = `
    <div class="rep-label">${r.label}</div>

      <textarea class="rep-notes" rows="2" placeholder="${r.notesPlaceholder}" data-field="${r.key}-notes"></textarea>
    </div>
  `;

function resetSessionMeta() {
  const n = new Date();
  // Local calendar date. valueAsDate is UTC-based and can land a day off near midnight.
  document.getElementById('sessionDate').value = localDateStr(n);
  document.getElementById('startTime').value = n.toTimeString().slice(0,5);
  document.getElementById('endTime').value = '';
  document.getElementById('duration').textContent = '—';
}

resetSessionMeta();

function setSessionNum(n) {
  sessionNum = Math.max(n, 1);
}

async function fetchSessionCount(date) {
  if (!date) return;
  try {
    const res = await apiFetch(API + '?limit=50');
    if (!res.ok) return;
    const rows = await res.json();
    const todays = rows.filter(r => r.session_date === date);
    setSessionNum(todays.length + 1);
  } catch(e) {
    /* silently fail — API may not be bound yet */
  }
}

// called from initApp() after auth succeeds

// <input type="date">.value is a plain local yyyy-mm-dd string, but valueAsDate
// and Date.toISOString() are UTC-based and can land on the wrong day near midnight.
// This converts a Date to its LOCAL calendar date so the default date, "today",
// and the saved session_date always agree with the user's own clock.
function localDateStr(d) {
  const local = new Date(d.getTime() - d.getTimezoneOffset() * 60000);
  return local.toISOString().slice(0, 10);
}

function formatMinutes(mins) {
  const m = Math.max(0, Math.round(mins || 0));
  if (m === 0) return '0m';
  const h = Math.floor(m / 60);
  const rem = m % 60;
  return h > 0 ? `${h}h ${rem}m` : `${rem}m`;
}

function formatTimeLabel(hhmm) {
  if (!hhmm) return '';
  const [h, m] = hhmm.split(':').map(Number);
  const d = new Date();
  d.setHours(h, m, 0, 0);
  return d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
}

function renderEntryChips(containerId, entries, emptyMessage) {
  const el = document.getElementById(containerId);
  if (!entries.length) {
    el.innerHTML = `<div class="strip-empty">${emptyMessage}</div>`;
    return;
  }
  el.innerHTML = entries.map(en =>
    `<div class="strip-chip${en.id === currentId ? ' chip-active' : ''}" data-id="${en.id}"><span class="chip-time">${formatTimeLabel(en.start_time)}</span>${en.label}</div>`
  ).join('');
}

async function loadStats() {
  const today = new Date();
  const dow = today.getDay(); // 0 = Sunday
  const weekStartDate = new Date(today); weekStartDate.setDate(today.getDate() - dow);
  const weekEndDate = new Date(today); weekEndDate.setDate(today.getDate() + (6 - dow));
  const params = new URLSearchParams({
    date: localDateStr(today),
    weekStart: localDateStr(weekStartDate),
    weekEnd: localDateStr(weekEndDate)
  });
  try {
    const res = await apiFetch(`${API_STATS}?${params}`);
    if (!res.ok) return;
    const data = await res.json();
    document.getElementById('statToday').textContent = formatMinutes(data.todayMinutes);
    document.getElementById('statWeek').textContent = formatMinutes(data.weekMinutes);
    document.getElementById('statAllTime').textContent = formatMinutes(data.allTimeMinutes);
    renderEntryChips('todayStrip', data.todayEntries || [], 'Nothing logged yet today');
  } catch (e) {
    /* silently fail — API may not be bound yet */
  }
}

async function loadHistoryDay(date) {
  if (!date) return;
  try {
    const res = await apiFetch(`${API_DAY}?date=${date}`);
    if (!res.ok) return;
    const data = await res.json();
    document.getElementById('historySummary').textContent = formatMinutes(data.minutes) + ' practiced';
    renderEntryChips('historyStrip', data.entries || [], 'Nothing logged that day');
  } catch (e) {
    /* silently fail — API may not be bound yet */
  }
}

// called from initApp() after auth succeeds

document.getElementById('sessionDate').addEventListener('change', e => {
  setCurrentId(null);
  fetchSessionCount(e.target.value);
});

function calcDuration() {
  const s = document.getElementById('startTime').value;
  const e = document.getElementById('endTime').value;
  if (!s || !e) { document.getElementById('duration').textContent = '—'; return; }
  const [sh,sm] = s.split(':').map(Number);
  const [eh,em] = e.split(':').map(Number);
  const diff = (eh*60+em) - (sh*60+sm);
  if (diff <= 0) { document.getElementById('duration').textContent = '—'; return; }
  document.getElementById('duration').textContent = diff + ' min';
}
document.getElementById('startTime').addEventListener('change', calcDuration);
document.getElementById('endTime').addEventListener('change', calcDuration);

document.getElementById('energyPips').addEventListener('click', e => {
  const ep = e.target.closest('.epip');
  if (!ep) return;
  if (document.querySelector('.wrap').classList.contains('dimmed')) hideNewEntryPrompt();
  document.querySelectorAll('#energyPips .epip').forEach(p => p.classList.remove('active'));
  ep.classList.add('active');
  energyVal = ep.dataset.val;
});

document.getElementById('modeBtn').addEventListener('click', () => {
  isDark = !isDark;
  document.body.classList.toggle('dark', isDark);
  document.getElementById('modeBtn').textContent = isDark ? '☀ Light' : '🌙 Dark';
});

function collectData() {
  const technique = {};
  techniques.forEach((t, i) => {
    const bpmstart = document.querySelector(`[data-field="bpmstart"][data-row="${i}"]`).value;
    const bpmend = document.querySelector(`[data-field="bpmend"][data-row="${i}"]`).value;
    const notes = document.querySelector(`[data-field="technotes"][data-row="${i}"]`).value;

    if (KEY_GRID_TECHNIQUES.includes(t)) {
      const keys = Array.from(document.querySelectorAll(`.key-grid[data-row="${i}"] .key-chip.active`)).map(el => el.dataset.key);
      const typeEl = document.querySelector(`.type-pips[data-row="${i}"] .type-pip.active`);
      technique[t] = { keys, scaleType: typeEl ? typeEl.dataset.type : '', bpmstart, bpmend, notes };
    } else if (PIECE_PICKER_TECHNIQUES.includes(t)) {
      const chipEl = document.querySelector(`.piece-chips[data-row="${i}"] .piece-chip.active`);
      technique[t] = { keyname: chipEl ? chipEl.dataset.name : '', bpmstart, bpmend, notes };
    } else {
      const keyname = document.querySelector(`[data-field="keyname"][data-row="${i}"]`).value;
      technique[t] = { keyname, bpmstart, bpmend, notes };
    }
  });
  const repertoire = {};
  repItems.forEach(r => {
    repertoire[r.label] = {
      measures: document.querySelector(`[data-field="${r.key}-measures"]`).value,
      notes: document.querySelector(`[data-field="${r.key}-notes"]`).value
    };
  });
  return {
    session_date: document.getElementById('sessionDate').value,
    start_time: document.getElementById('startTime').value,
    end_time: document.getElementById('endTime').value,
    session_num: sessionNum,
    energy: energyVal,
    win: document.getElementById('winField').value,
    technique_json: technique,
    repertoire_json: repertoire
  };
}

function setStatus(msg, cls) {
  const el = document.getElementById('saveStatus');
  el.textContent = msg;
  el.className = 'save-status' + (cls ? ' ' + cls : '');
}

async function doSave(isManual) {
  if (isManual) {
    const endEl = document.getElementById('endTime');
    if (!endEl.value) {
      endEl.value = new Date().toTimeString().slice(0, 5);
      calcDuration();
    }
  }
  const data = collectData();
  try {
    if (currentId) {
      await apiFetch(API, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id: currentId, ...data }) });
    } else {
      const res = await apiFetch(API, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
      const json = await res.json();
      if (json.id) setCurrentId(json.id);
    }
    const t = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    setStatus('Saved at ' + t, 'saved');
    loadStats();
    if (isManual) showNewEntryPrompt();
  } catch(err) {
    setStatus('Save failed — check connection', 'error');
  }
}

function showNewEntryPrompt() {
  document.querySelector('.wrap').classList.add('dimmed');
  document.getElementById('newEntryBtn').classList.add('visible');
}

function hideNewEntryPrompt() {
  document.querySelector('.wrap').classList.remove('dimmed');
  document.getElementById('newEntryBtn').classList.remove('visible');
}

function newEntry() {
  setCurrentId(null);
  document.querySelectorAll('#techCards input, #techCards textarea').forEach(el => el.value = '');
  document.querySelectorAll('#techCards .key-chip.active, #techCards .type-pip.active, #techCards .piece-chip.active').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('#repBlocks input, #repBlocks textarea').forEach(el => el.value = '');
  document.getElementById('winField').value = '';
  document.querySelectorAll('#energyPips .epip').forEach(p => p.classList.remove('active'));
  document.querySelector('#energyPips .epip[data-val="good"]').classList.add('active');
  energyVal = 'good';
  resetSessionMeta();
  setSessionNum(sessionNum + 1);
  setStatus('Not saved yet');
  hideNewEntryPrompt();
}

document.getElementById('newEntryBtn').addEventListener('click', newEntry);

document.getElementById('saveBtn').addEventListener('click', () => doSave(true));

async function loadEntry(id) {
  try {
    const res = await apiFetch(`${API}?id=${id}`);
    if (!res.ok) return;
    const row = await res.json();
    if (!row) return;

    document.getElementById('sessionDate').value = row.session_date || '';
    document.getElementById('startTime').value = row.start_time || '';
    document.getElementById('endTime').value = row.end_time || '';
    calcDuration();

    const tech = JSON.parse(row.technique_json || '{}');
    techniques.forEach((t, i) => {
      const v = tech[t] || {};
      if (KEY_GRID_TECHNIQUES.includes(t)) {
        const keys = Array.isArray(v.keys) ? v.keys : [];
        document.querySelectorAll(`.key-grid[data-row="${i}"] .key-chip`).forEach(el => {
          el.classList.toggle('active', keys.includes(el.dataset.key));
        });
        document.querySelectorAll(`.type-pips[data-row="${i}"] .type-pip`).forEach(el => {
          el.classList.toggle('active', el.dataset.type === v.scaleType);
        });
      } else if (PIECE_PICKER_TECHNIQUES.includes(t)) {
        document.querySelectorAll(`.piece-chips[data-row="${i}"] .piece-chip`).forEach(el => {
          el.classList.toggle('active', el.dataset.name === v.keyname);
        });
      } else {
        document.querySelector(`[data-field="keyname"][data-row="${i}"]`).value = v.keyname || '';
      }
      document.querySelector(`[data-field="bpmstart"][data-row="${i}"]`).value = v.bpmstart || '';
      document.querySelector(`[data-field="bpmend"][data-row="${i}"]`).value = v.bpmend || '';
      document.querySelector(`[data-field="technotes"][data-row="${i}"]`).value = v.notes || '';
    });

    const rep = JSON.parse(row.repertoire_json || '{}');
    repItems.forEach(r => {
      const v = rep[r.label] || {};
      document.querySelector(`[data-field="${r.key}-measures"]`).value = v.measures || '';
      document.querySelector(`[data-field="${r.key}-notes"]`).value = v.notes || '';
    });

    document.getElementById('winField').value = row.win || '';
    document.querySelectorAll('#energyPips .epip').forEach(p => p.classList.remove('active'));
    const epEl = document.querySelector(`#energyPips .epip[data-val="${row.energy || 'good'}"]`);
    if (epEl) epEl.classList.add('active');
    energyVal = row.energy || 'good';

    setSessionNum(row.session_num || 1);
    setCurrentId(row.id);
    hideNewEntryPrompt();
    setStatus('Editing entry from ' + (row.start_time || row.session_date));
    loadStats();
    if (document.getElementById('historyPanel').classList.contains('open')) {
      loadHistoryDay(document.getElementById('historyDate').value);
    }
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } catch (err) {
    setStatus('Could not load entry — check connection', 'error');
  }
}

function wireEntryChipClicks(containerId) {
  document.getElementById(containerId).addEventListener('click', e => {
    const chip = e.target.closest('.strip-chip');
    if (!chip || !chip.dataset.id) return;
    loadEntry(chip.dataset.id);
  });
}
wireEntryChipClicks('todayStrip');
wireEntryChipClicks('historyStrip');

document.getElementById('historyToggle').addEventListener('click', () => {
  const panel = document.getElementById('historyPanel');
  const opening = !panel.classList.contains('open');
  panel.classList.toggle('open', opening);
  document.getElementById('todayStrip').style.display = opening ? 'none' : '';

    const dateInput = document.getElementById('historyDate');

    loadHistoryDay(dateInput.value);
  }
});

document.getElementById('historyDate').addEventListener('change', e => {
  loadHistoryDay(e.target.value);
});

document.getElementById('historyBack').addEventListener('click', () => {
  document.getElementById('historyPanel').classList.remove('open');
  document.getElementById('todayStrip').style.display = '';
});

async function deleteEntry() {
  if (!currentId) return;
  if (!confirm('Delete this entry? This cannot be undone.')) return;
  try {
    await apiFetch(`${API}?id=${currentId}`, { method: 'DELETE' });
    newEntry();
    fetchSessionCount(document.getElementById('sessionDate').value);
    loadStats();
    setStatus('Entry deleted');
  } catch (err) {
    setStatus('Delete failed — check connection', 'error');
  }
}

document.getElementById('deleteBtn').addEventListener('click', deleteEntry);

function buildPDF() {
  const data = collectData();
  const energyLabel = { low: 'Low', good: 'Good', fire: '🔥' }[data.energy] || '';
  const durationEl = document.getElementById('duration').textContent;
  let html = `<html><head><title>Practice log</title><style>
    body{font-family:Georgia,serif;color:#2C1810;padding:40px;max-width:700px;margin:auto;}
    h1{font-size:22px;border-bottom:2px solid #2C1810;padding-bottom:10px;margin-bottom:4px;}
    .meta{font-size:12px;color:#7A5535;margin-bottom:24px;font-style:italic;}
    .badges{display:flex;gap:16px;margin-bottom:24px;}
    .badge{font-size:12px;background:#F5EDD8;border:1px solid #C9A87C;padding:4px 10px;border-radius:4px;color:#2C1810;}
    h2{font-size:14px;letter-spacing:0.08em;text-transform:uppercase;color:#7A5535;margin:20px 0 10px;border-bottom:0.5px solid #D4B896;padding-bottom:6px;}
    table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:16px;}
    td,th{border:1px solid #E8DFD0;padding:7px 10px;text-align:left;vertical-align:top;}
    th{background:#FAF6F0;font-size:11px;letter-spacing:0.06em;text-transform:uppercase;color:#7A5535;font-weight:400;}
    .win{background:#FAF6F0;border:1.5px solid #8B3A1A;border-radius:6px;padding:12px 16px;margin-top:20px;font-style:italic;}
    .win-label{font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:#8B3A1A;margin-bottom:4px;}
  </style></head><body>
  <h1>Practice log</h1>
  <div class="meta">Jon Ward &middot; piano &middot; ${data.session_date}</div>
  <div class="badges">
    <div class="badge">Session ${data.session_num}</div>
    <div class="badge">${data.start_time}${data.end_time ? ' – ' + data.end_time : ''} &nbsp;(${durationEl})</div>
    <div class="badge">Energy: ${energyLabel}</div>
  </div>
  <h2>Technique &mdash; 20 min</h2>
  <table><tr><th>Technique</th><th>Key / name</th><th>Metronome start → end</th><th>Notes</th></tr>`;
  techniques.forEach(t => {
    const r = data.technique_json[t];
    const bpm = r.bpmstart || r.bpmend ? (r.bpmstart || '?') + ' → ' + (r.bpmend || '?') : '—';
    let display;
    if (KEY_GRID_TECHNIQUES.includes(t)) {
      const keysStr = (r.keys && r.keys.length) ? r.keys.join(', ') : '';
      display = keysStr ? `${keysStr}${r.scaleType ? ' (' + r.scaleType + ')' : ''}` : '—';
    } else {
      display = r.keyname || '—';
    }
    html += `<tr><td>${t}</td><td>${display}</td><td>${bpm}</td><td>${r.notes||'—'}</td></tr>`;
  });
  html += `</table><h2>Repertoire &mdash; 25 min</h2>
  <table><tr><th>Repertoire</th><th>Measures / portion</th><th>Notes</th></tr>`;
  repItems.forEach(r => {
    const row = data.repertoire_json[r.label];
    html += `<tr><td>${r.label}</td><td>${row.measures||'—'}</td><td>${row.notes||'—'}</td></tr>`;
  });
  html += `</table>`;
  if (data.win) html += `<div class="win"><div class="win-label">Win of the session</div>${data.win}</div>`;
  html += `</body></html>`;
  const w = window.open('', '_blank');
  w.document.write(html);
  w.document.close();
  setTimeout(() => w.print(), 400);
}

document.getElementById('exportBtn').addEventListener('click', buildPDF);
document.getElementById('exportBtn2').addEventListener('click', buildPDF);

document.querySelectorAll('input, textarea').forEach(el => {

  });

function initApp() {
  loadTechnicalPieces();
  fetchSessionCount(document.getElementById('sessionDate').value);
  loadStats();
  // Deep link from the data page's "Edit details" (data.html?edit=<id> -> index.html?edit=<id>)
  const editId = new URLSearchParams(window.location.search).get('edit');
  if (editId) loadEntry(editId);
}

function showApp() {
  document.getElementById('authGate').style.display = 'none';
  document.getElementById('appWrap').style.display = '';
  initApp();
}

async function tryPassword(pw) {
  try {
    const res = await fetch(API + '?limit=1', { headers: { 'X-App-Password': pw } });
    return res.status !== 401;
  } catch (e) {
    return false;
  }
}

async function attemptUnlock() {
  const input = document.getElementById('authInput');
  const errEl = document.getElementById('authError');
  const btn = document.getElementById('authSubmit');
  const pw = input.value;
  errEl.textContent = '';
  if (!pw) return;
  btn.disabled = true;
  btn.textContent = 'Checking...';
  const ok = await tryPassword(pw);
  btn.disabled = false;
  btn.textContent = 'Unlock';
  if (ok) {
    localStorage.setItem(PASSWORD_KEY, pw);
    showApp();
  } else {
    errEl.textContent = 'Incorrect password';
    input.value = '';
    input.focus();
  }
}

document.getElementById('authSubmit').addEventListener('click', attemptUnlock);
document.getElementById('authInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') attemptUnlock();
});

// If a password is already stored on this device, verify it silently and
// skip straight to the app instead of making the user re-type it.
(async function bootstrap() {
  const stored = getStoredPassword();
  if (stored) {
    const ok = await tryPassword(stored);
    if (ok) { showApp(); return; }
    localStorage.removeItem(PASSWORD_KEY);
  }
  document.getElementById('authInput').focus();
})();
</script>
